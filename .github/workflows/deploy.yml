name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: quiz-hi1984
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'

      - name: Bind custom domain (idempotent)
        if: success()
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          A: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          RESP=$(curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${A}/pages/projects/quiz-hi1984/domains" \
            -H "Authorization: ${T}" \
            -H "Content-Type: application/json" \
            --data '{"name":"quiz.hi1984.com"}' \
            -w "\nHTTP_STATUS:%{http_code}")
          STATUS=$(echo "$RESP" | grep -oE 'HTTP_STATUS:[0-9]+' | cut -d: -f2)
          BODY=$(echo "$RESP" | sed '/HTTP_STATUS:/d')
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
            echo "OK Custom domain quiz.hi1984.com bound"
          elif echo "$BODY" | grep -q '"code":8000'; then
            echo "INFO Domain already bound (idempotent)"
          else
            echo "WARN Domain bind returned $STATUS"
            echo "$BODY"
            exit 1
          fi

      - name: Deployment summary
        if: always()
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          F="${F}"
          echo "### Cloudflare Pages deploy done" >> "$F"
          echo "" >> "$F"
          echo "- URL: https://quiz.hi1984.com" >> "$F"
          echo "- Repo: chinesewebman/buddhism-quiz" >> "$F"
          echo "- Trigger: $GITHUB_EVENT_NAME ($GITHUB_REF)" >> "$F"
          echo "- Commit: $GITHUB_SHA" >> "$F"
