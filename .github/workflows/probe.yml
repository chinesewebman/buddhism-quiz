name: Probe
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check DNS records for hi1984.com
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "=== Find zone for hi1984.com ==="
          ZONE=$(curl -sS -H "Authorization: Bearer ${T}" \
            "https://api.cloudflare.com/client/v4/zones?name=hi1984.com" \
            | python3 -c "import sys,json;d=json.load(sys.stdin);print(d['result'][0]['id'] if d['result'] else 'NOT_FOUND')")
          echo "ZONE_ID=$ZONE"
          echo ""
          echo "=== DNS records for quiz.hi1984.com ==="
          curl -sS -H "Authorization: Bearer ${T}" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE/dns_records?name=quiz.hi1984.com" \
            | python3 -m json.tool | head -40
          echo ""
          echo "=== All CNAME records in zone ==="
          curl -sS -H "Authorization: Bearer ${T}" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE/dns_records?type=CNAME" \
            | python3 -m json.tool | head -50
