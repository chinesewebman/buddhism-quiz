name: Probe
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: DNS + Pages project check
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          A: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          TREF="$T"
          AREF="$A"
          HDR="Authorization: Bearer $T"
          echo "=== DNS A/AAAA ==="
          dig +short quiz.hi1984.com @1.1.1.1
          echo ""
          echo "=== CNAME ==="
          dig +short CNAME quiz.hi1984.com @1.1.1.1
          echo ""
          echo "=== Pages project status ==="
          curl -sS -H "$HDR" "https://api.cloudflare.com/client/v4/accounts/$AREF/pages/projects/quiz-hi1984" | python3 -m json.tool | head -30
          echo ""
          echo "=== Pages project domains ==="
          curl -sS -H "$HDR" "https://api.cloudflare.com/client/v4/accounts/$AREF/pages/projects/quiz-hi1984/domains" | python3 -m json.tool | head -50
          echo ""
          echo "=== Direct curl from US ==="
          curl -sS -o /dev/null -w "HTTP %{http_code} | size=%{size_download}B\n" --max-time 15 https://quiz.hi1984.com/ 2>&1
