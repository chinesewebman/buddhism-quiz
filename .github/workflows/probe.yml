name: Probe
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check DNS records for hi1984.com
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "=== List DNS records matching quiz ==="
          curl -sS -H "Authorization: Bearer *** " \
            "https://api.cloudflare.com/client/v4/zones?name=hi1984.com" | head -200
          echo ""
          echo "=== Get zone ID for hi1984.com ==="
          ZONE=$(curl -sS -H "Authorization: Bearer *** " \
            "https://api.cloudflare.com/client/v4/zones?name=hi1984.com" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d['result'][0]['id'] if d['result'] else 'NOT_FOUND')")
          echo "ZONE_ID=$ZONE"
          if [ "$ZONE" != "NOT_FOUND" ]; then
            echo ""
            echo "=== DNS records for quiz* ==="
            curl -sS -H "Authorization: Bearer *** " \
              "https://api.cloudflare.com/client/v4/zones/$ZONE/dns_records?name=quiz.hi1984.com" | head -100
            echo ""
            echo "=== All CNAME records in zone ==="
            curl -sS -H "Authorization: Bearer *** " \
              "https://api.cloudflare.com/client/v4/zones/$ZONE/dns_records?type=CNAME" | python3 -m json.tool | head -40
          fi
